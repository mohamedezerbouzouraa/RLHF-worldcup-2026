<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>FIFA World Cup 2026 — AI Chatbot · Llama 3.3 70B</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght=300;400;500;600;700;800&family=Space+Grotesk:wght=400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="bg-image"></div>
<div class="bg-overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-trophy">🏆</span>
      <div>
        <div class="sidebar-title">World Cup</div>
        <div class="sidebar-year">2026</div>
      </div>
    </div>
    <div class="sidebar-section-title">GROUPES</div>
    <div id="group-list" class="group-list"></div>
    <div class="sidebar-section-title" style="margin-top:16px;">ACCÈS RAPIDE</div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="quickSend('Montre tous les groupes')">Montre tous les groupes</button>
      <button class="quick-btn" onclick="quickSend('Explique le format de la Coupe du Monde 2026')">Format du tournoi 2026</button>
      <button class="quick-btn" onclick="quickSend('Qui sont les favoris pour gagner le Mondial 2026 ?')">Favoris & Prédictions</button>
    </div>
    <div class="sidebar-model-status" id="model-status">
      <span class="status-dot" id="status-dot"></span>
      <div>
        <span id="status-label">Vérification...</span>
        <span id="rlhf-count"></span>
      </div>
    </div>
  </aside>
  <main class="main">
    <header class="header">
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <div class="header-center">
        <div class="header-title">FIFA World Cup 2026</div>
        <div class="header-sub">Analyste IA · llama-3.3-70b-versatile</div>
      </div>
      <div class="header-badge">RLHF + Groq</div>
    </header>
    <div class="chat-window" id="chat-window"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <span class="input-icon">⚽</span>
        <input type="text" id="chat-input" placeholder='Ex : "Groupe C", "Analyse la France", "Qui va gagner le Mondial ?"' autocomplete="off"/>
        <button id="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13\"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </main>
</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
